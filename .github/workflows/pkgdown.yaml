name: pkgdown

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pkgdown:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc --version

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site (to docs/)
        run: pkgdown::build_site_github_pages(new_process = FALSE)
        shell: Rscript {0}

      - name: Deploy dev site to gh-pages/dev
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          target-folder: dev
          clean: true

      - name: Deploy release site to gh-pages root
        if: startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
          clean-exclude: dev
